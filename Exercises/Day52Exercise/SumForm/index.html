<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="container mt-5">
      <form action="#">
        <div class="input-group">
          <input
            type="text"
            id="num1"
            class="form-control"
            placeholder="Number"
            aria-label="Number"
            oninput="checkNum(this.id, 'oninput')"
            onblur="checkNum(this.id, 'onblur')"
            onfocus="checkNum(this.id, 'onfocus')"
          />
          <span class="input-group-text">+</span>
          <input
          id="num2"
            type="text"
            id="num2"
            class="form-control"
            placeholder="Number"
            aria-label="Number"
            oninput="checkNum(this.id, 'oninput')"
            onblur="checkNum(this.id, 'onblur')"
            onfocus="checkNum(this.id, 'onfocus')"
          />
          <button type="button" class="btn btn-outline-secondary px-5 mx-3" onclick="addNumbers()">
            =
          </button>
          <input
            type="text"
            id="result"
            class="form-control"
            placeholder="Sum"
            aria-label="Sum"
            readonly
          />
        </div>
      </form>
    </div>

    <script>
      function checkNum(id, attribute) {
        const num = document.getElementById(id);
        if (isNaN(num.value))
          num.style.backgroundColor = 'yellow'
        else if (num.value === "" && attribute == 'onblur')
          num.style.backgroundColor = 'red'
        else 
          num.style.backgroundColor = 'white'
      }

      function addNumbers() {
        const num1 = document.getElementById('num1').value;
        const num2 = document.getElementById('num2').value;
        const result = document.getElementById('result');

        const sum = parseInt(num1) + parseInt(num2);

        if (isNaN(sum)) {
          result.value = 'Error';
          result.style.backgroundColor = 'orange'
        }
        else {
          result.value = sum
          result.style.backgroundColor = 'white'
        }
      }
    </script>
  </body>
</html>
