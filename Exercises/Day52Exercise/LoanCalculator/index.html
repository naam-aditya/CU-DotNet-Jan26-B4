<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <main class="m-5">
      <form action="#">
        <div class="mb-3">
          <label for="amount" class="form-label">Loan Amount:</label>
          <input
            type="text"
            id="amount"
            class="form-control w-25"
            placeholder="0"
            aria-label="Loan Amount"
            required
          />
        </div>

        <div class="mb-3">
          <label for="rate" class="form-label"
            >Interest Rate (% per year):</label
          >
          <input
            type="text"
            id="rate"
            class="form-control w-25"
            placeholder="0"
            aria-label="Interest Rate"
            required
          />
        </div>

        <div class="mb-3">
          <label for="months" class="form-label">Tenure (Months):</label>
          <input
            type="text"
            id="months"
            class="form-control w-25"
            placeholder="0"
            aria-label="Tenure"
          />
        </div>
        <button
          type="button"
          class="btn btn-outline-secondary px-5 mb-3"
          onclick="calculateLoan()"
        >
          Calculate
        </button>
      </form>

      <table
        class="table table-hover table-striped text-end"
        style="table-layout: fixed; width: 770px;"
        border="1"
      >
        <colgroup>
          <col style="width: 70px" />
          <col style="width: 140px" />
          <col style="width: 120px" />
          <col style="width: 120px" />
          <col style="width: 120px" />
          <col style="width: 200px" />
        </colgroup>

        <thead class="table-dark">
          <tr>
            <th>S.No.</th>
            <th>Loan Left</th>
            <th>EMI</th>
            <th>Principal</th>
            <th>Interest</th>
            <th>Remaining Balance</th>
          </tr>
        </thead>

        <tbody id="scheduleBody"></tbody>
      </table>
    </main>

    <script>
      function calculateLoan() {
        let amount = parseFloat(document.getElementById("amount").value);
        let rate = parseFloat(document.getElementById("rate").value);
        let months = parseFloat(document.getElementById("months").value);

        let monthlyRate = rate / 12 / 100;
        let emi =
          (amount * monthlyRate * Math.pow(1 + monthlyRate, months)) /
          (Math.pow(1 + monthlyRate, months) - 1);

        let balance = amount;
        let table = document.getElementById("scheduleBody");
        table.innerHTML = "";

        for (let i = 1; i <= months; i++) {
          let interest = balance * monthlyRate;
          let principal = emi - interest;
          let remaining = balance - principal;

          let row = `
            <tr>
              <td> ${i} </td>
              <td> ${balance.toFixed(2)} </td>
              <td> ${emi.toFixed(2)} </td>
              <td> ${principal.toFixed(2)} </td>
              <td> ${interest.toFixed(2)} </td>
              <td> ${Math.abs(remaining).toFixed(2)} </td>
            </tr>
          `;

          table.innerHTML += row;
          balance = remaining;
        }
      }
    </script>
  </body>
</html>
