<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="container m-5" id="image-container" onclick="toggleBulb()">
      <img src="./bulb-off.png" id="image" width="600px" height="600px" alt="" />
      <button class="btn btn-dark" oninput="toggleBulb()">Toggle Light</button>
    </div>
    <script>
      function toggleBulb() {
        let image = document.getElementById('image')
        if (image.src.endsWith('/bulb-on.png'))
          image.src = './bulb-off.png'
        else {
          image.src = './bulb-on.png'
          document.getElementsByTagName
        }
      }
    </script>
  </body>
</html>
